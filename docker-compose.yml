services:
  server:
    build: ./server
    container_name: crisisconnect-server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      - MONGO_URI=mongodb://mongo:27017/crisis
    restart: always
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo
    restart: always
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s

  client:
    build: ./client
    container_name: crisisconnect-client
    ports:
      - "8080:80"
    depends_on:
      server:
        condition: service_started

volumes:
  mongo-data:
  